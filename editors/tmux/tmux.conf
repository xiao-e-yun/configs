# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'whame/tmux-modal'

# Configuration for tmux-modal
set -g @modal-keybindings-conf ~/.tmux/configs/modal-keybindings.conf
set -g @modal-cmd-icon " [NORMAL]"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X select-block
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# After tmux-modal loads, make `C-a v` enter copy mode (replacing the default
# `C-a c`). Once in copy mode: move the cursor, press `v` to begin selection,
# `Esc` to quit. Bound into tmux-modal's command keytable (ktm-cmd); must run
# after tpm/tmux-modal so it overrides the plugin's defaults.
unbind-key -T ktm-cmd c
bind-key -T ktm-cmd v copy-mode
